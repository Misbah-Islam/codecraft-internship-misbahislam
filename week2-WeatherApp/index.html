<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App | CodeCraft Internship</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="themeToggle" class="theme-btn">🌙</button>

  <div class="container">
    <h1>🌦️ Weather App</h1>
    <p id="dateTime" class="datetime"></p>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Enter city name...">
      <button id="searchBtn">Search</button>
    </div>

    <p id="errorMsg" class="error hidden">⚠️ City not found. Try again.</p>

    <div id="weatherCard" class="weather-card hidden">
      <h2 id="cityName"></h2>
      <img id="weatherIcon" src="" alt="weather icon">
      <h1 id="temperature"></h1>
      <p id="condition"></p>
      <div class="details">
        <div>💧 Humidity<br><span id="humidity"></span></div>
        <div>💨 Wind<br><span id="wind"></span></div>
      </div>
    </div>

    <div class="recent">
      <h3>Recent Searches</h3>
      <div id="recentList" class="recent-list"></div>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
