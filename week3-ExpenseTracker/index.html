<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker | CodeCraft Internship</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>💰 Expense Tracker</h1>

    <div class="balance-card">
      <p>Total Balance</p>
      <h2 id="balance">PKR 0</h2>
      <div class="income-expense">
        <div>
          <p>Income</p>
          <h3 id="totalIncome" class="income">PKR 0</h3>
        </div>
        <div>
          <p>Expense</p>
          <h3 id="totalExpense" class="expense">PKR 0</h3>
        </div>
      </div>
    </div>

    <form id="transactionForm">
      <input type="text" id="title" placeholder="Title (e.g. Salary, Grocery)" required>
      <input type="number" id="amount" placeholder="Amount" required>
      <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
      <select id="category">
        <option value="General">General</option>
        <option value="Food">Food</option>
        <option value="Salary">Salary</option>
        <option value="Bills">Bills</option>
        <option value="Shopping">Shopping</option>
        <option value="Other">Other</option>
      </select>
      <button type="submit">Add Transaction</button>
    </form>

    <div class="filters">
      <input type="text" id="searchInput" placeholder="🔍 Search transactions...">
      <select id="filterType">
        <option value="all">All</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
    </div>

    <h3>History</h3>
    <ul id="transactionList"></ul>
  </div>

<script src="script.js"></script>
</body>
</html>
